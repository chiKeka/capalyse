version: "3.9"

services:
  app:
    image: capalyse-app:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: capalyse-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - capalyse-network

networks:
  capalyse-network:
    driver: bridge
